<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公司內部線上管理系統 - 主管高級權限版</title>
    <style>
        :root {
            --primary: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --gray: #f3f4f6;
            --text-main: #1f2937;
        }
        body {
            font-family: 'Segoe UI', Microsoft JhengHei, sans-serif;
            margin: 0;
            background-color: #f3f4f6;
            color: var(--text-main);
        }
        header {
            background-color: #1e293b; /* 主管端使用高級深色調橫條 */
            color: #ffffff !important;
            padding: 1.2rem;
            text-align: center;
            font-size: 1.6rem;
            font-weight: bold;
        }
        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #d1d5db;
            overflow-x: auto;
            background: white;
            padding: 0.5rem;
            border-radius: 8px 8px 0 0;
        }
        .tab-btn {
            padding: 0.75rem 1.5rem;
            border: none;
            background: none;
            font-size: 1.05rem;
            cursor: pointer;
            white-space: nowrap;
            color: #4b5563 !important;
            font-weight: 600;
        }
        .tab-btn.active {
            color: var(--primary) !important;
            border-bottom: 3px solid var(--primary);
            font-weight: bold;
        }
        .panel {
            background: white;
            padding: 2rem;
            border-radius: 0 0 8px 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: none;
        }
        .panel.active { display: block; }
        h2 {
            margin-top: 0;
            color: #111827 !important;
            border-left: 5px solid var(--primary);
            padding-left: 0.6rem;
        }
        p, label { color: var(--text-main) !important; font-weight: 600; }
        input, select, textarea {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #d1d5db;
            border-radius: 6px;
            box-sizing: border-box;
            color: #111827 !important;
        }
        button {
            color: #ffffff !important;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
        }
        .btn-success { background-color: var(--success); }
        .btn-danger { background-color: var(--danger); }
        .btn-primary { background-color: var(--primary); }
        .btn-group { display: flex; gap: 1rem; margin-top: 1rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { border: 1px solid #e5e7eb; padding: 0.75rem; text-align: left; color: var(--text-main) !important; }
        th { background-color: #f3f4f6; }
        .admin-note {
            background-color: #fef3c7;
            border: 1px solid #f59e0b;
            color: #92400e !important;
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1.5rem;
        }
        .admin-note b, .admin-note p { color: #92400e !important; }
    </style>
</head>
<body>

    <header>🔑 公司線上管理系統 (主管最高權限核心)</header>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('punch')">⏰ 上下班打卡</button>
            <button class="tab-btn" onclick="switchTab('business')">💼 出差登記與總覽</button>
            <button class="tab-btn" onclick="switchTab('leave')">🌴 請假申請</button>
            <button class="tab-btn" onclick="switchTab('car')">🚗 公務車申請</button>
            <button class="tab-btn" onclick="switchTab('audit')" style="color: #ef4444 !important; background-color: #fee2e2; border-radius: 4px;">🔑 主管審核專區</button>
        </div>

        <div id="punch" class="panel active">
            <h2>⏰ 上下班打卡</h2>
            <div class="form-group"><label>員工姓名</label><input type="text" id="punch-name"></div>
            <div id="current-time" style="margin-bottom: 1rem; font-weight: bold;"></div>
            <div class="btn-group">
                <button class="btn-success" onclick="doPunch('上班')">🎯 上班打卡</button>
                <button class="btn-danger" onclick="doPunch('下班')">🚪 下班打卡</button>
            </div>
        </div>

        <div id="business" class="panel">
            <h2>💼 出差登記總覽</h2>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 1rem;">
                <h2>👥 全員出差動態總覽</h2>
                <button class="btn-primary" onclick="loadBusinessData()">🔄 重新整理</button>
            </div>
            <table id="business-table"><thead><tr><th>姓名</th><th>出差地點</th><th>開始時間</th><th>結束時間</th></tr></thead><tbody></tbody></table>
        </div>

        <div id="leave" class="panel"><h2>🌴 請假申請表單</h2></div>
        <div id="car" class="panel"><h2>🚗 公務車使用申請</h2></div>

        <div id="audit" class="panel">
            <h2>🔑 主管審核內部中央後台</h2>
            <div class="admin-note">
                <b>💡 審核與數據修改說明：</b><br>
                <p>請點擊下方綠色按鈕進入真正的 Google 雲端試算表後台。您可以在試算表中直接對員工的打卡、出差、請假進行修改、刪除或標註「已核准 / 駁回」，前端網頁將會同步更新。</p>
            </div>
            
            <button onclick="window.open('https://docs.google.com/spreadsheets/d/144A_yLymX-fOn_E29UfKAsWb-qZonqR9gK4B6A6aQIs/edit', '_blank')" style="background-color: var(--success); font-size: 1.1rem; padding: 1rem 2rem;">🔓 點此進入 Google 試算表中央後台修改資料</button>
            
            <br><br><br>
            <h3>待處理請假動態（模擬前端看板）</h3>
            <table>
                <thead><tr><th>申請人</th><th>假別</th><th>日期</th><th>事由</th><th>狀態</th><th>快捷操作</th></tr></thead>
                <tbody>
                    <tr>
                        <td>王小明</td><td>特休</td><td>2026-06-01</td><td>家中有事</td><td><span style="color:#f59e0b; font-weight: bold;">待審核</span></td>
                        <td>
                            <button class="btn-success" style="padding:4px 12px; font-size:0.85rem;" onclick="alert('已模擬核准！請記得在後台試算表記錄。')">核准</button>
                            <button class="btn-danger" style="padding:4px 12px; font-size:0.85rem;" onclick="alert('已駁回該申請。')">駁回</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const GOOGLE_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRAkvGq_ZM5nxqB7oM2A0RYobjs9Cex0b-tzpTxAln5IoKr38iHHv8CywxHV_QjoTfWYHcFzs9JDfvj/pub?tqx=out:csv";
        setInterval(() => { document.getElementById('current-time').innerText = "目前時間：" + new Date().toLocaleString(); }, 1000);
        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(panel => panel.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
            if(tabId === 'business') { loadBusinessData(); }
        }
        function doPunch(type) { alert(`成功${type}打卡！`); }
        function loadBusinessData() {
            fetch(GOOGLE_CSV_URL).then(res => res.text()).then(data => {
                const lines = data.split('\n').map(line => line.split(',').map(cell => cell.replace(/"/g, '').trim()));
                const tbody = document.querySelector('#business-table tbody'); tbody.innerHTML = ''; 
                for(let i = 1; i < lines.length; i++) {
                    if(lines[i].length >= 7 && lines[i][1] !== "") {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `<td>${lines[i][1]}</td><td>${lines[i][2]}</td><td>${lines[i][3]} ${lines[i][4]}</td><td>${lines[i][5]} ${lines[i][6]}</td>`;
                        tbody.appendChild(tr);
                    }
                }
            }).catch(err => console.error(err));
        }
        window.onload = function() { loadBusinessData(); };
    </script>
</body>
</html>
